{% extends 'base.html' %}
{% block content %}
<div class="ph">
  <div><a href="/" style="font-size:13px;color:#6b7280">← 대시보드</a>
  <h1 style="margin-top:4px">상품 추가</h1></div>
</div>

<div class="card" style="max-width:600px">
  <form method="POST" action="/add">
    <div class="form-group">
      <label>상품명 *</label>
      <input type="text" name="name" class="form-control" required
             placeholder="예: 경쟁사 호스꼬임방지기 A형">
    </div>
    <div class="form-group">
      <label>플랫폼 *</label>
      <div style="display:flex;gap:10px;margin-top:4px">
        {% for val, label in [('naver','네이버 스마트스토어'), ('coupang','쿠팡')] %}
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;
                      padding:8px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:13px"
               id="plat_{{ val }}">
          <input type="radio" name="platform" value="{{ val }}"
                 {% if val=='naver' %}checked{% endif %}
                 style="display:none" onchange="selPlat('{{ val }}')">
          {{ label }}
        </label>
        {% endfor %}
      </div>
    </div>
    <div class="form-group">
      <label>상품 URL *</label>
      <input type="url" name="url" class="form-control" required
             placeholder="https://smartstore.naver.com/...">
      <div style="font-size:11px;color:#aaa;margin-top:4px">상품 상세 페이지 URL을 붙여넣으세요</div>
    </div>
    <div class="form-group">
      <label>메모</label>
      <input type="text" name="memo" class="form-control"
             placeholder="예: 메인 경쟁사, 가격 비슷">
    </div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary">추가</button>
      <a href="/" class="btn btn-secondary">취소</a>
    </div>
  </form>
</div>

<script>
function selPlat(val) {
  ['naver','coupang'].forEach(function(v) {
    var el = document.getElementById('plat_' + v);
    el.style.borderColor = v === val ? '#4f46e5' : '#e0e0e0';
    el.style.background  = v === val ? '#ede9fe' : '#fff';
  });
}
selPlat('naver');
</script>
{% endblock %}
