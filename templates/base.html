<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>염탐기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f4f5f7;color:#222;font-size:14px}
a{color:inherit;text-decoration:none}

.nav{background:#16213e;color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav .brand{font-size:17px;font-weight:700}
.nav-links{display:flex;gap:4px}
.nav-links a{color:rgba(255,255,255,.75);padding:7px 13px;border-radius:7px;font-size:13px;font-weight:500;transition:all .15s}
.nav-links a:hover,.nav-links a.on{background:rgba(255,255,255,.15);color:#fff}

.wrap{max-width:1200px;margin:0 auto;padding:28px 24px}

.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.ph h1{font-size:20px;font-weight:700}
.ph p{color:#777;font-size:13px;margin-top:3px}

.card{background:#fff;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;color:#111}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{background:#f8f9fa;padding:10px 13px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #eee;white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid #f1f1f1;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafafa}

.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-secondary{background:#e9ecef;color:#495057}.btn-secondary:hover{background:#dee2e6}
.btn-sm{padding:5px 10px;font-size:12px}

.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600}
.bg-blue{background:#dbeafe;color:#1e40af}
.bg-green{background:#d1fae5;color:#065f46}
.bg-red{background:#fee2e2;color:#991b1b}
.bg-gray{background:#f3f4f6;color:#6b7280}
.bg-yellow{background:#fef3c7;color:#92400e}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px}
.form-control{width:100%;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:#fff}
.form-control:focus{border-color:#4f46e5}

.alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:500}
.alert-ok{background:#d1fae5;color:#065f46}

.tr{text-align:right}
.tc{text-align:center}
.up{color:#10b981;font-weight:700}
.dn{color:#ef4444;font-weight:700}
.gray{color:#9ca3af}
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">🔍 염탐기</span>
  <div class="nav-links">
    <a href="/" {% if request.endpoint=='dashboard' %}class="on"{% endif %}>대시보드</a>
    <a href="/keywords" {% if request.endpoint=='keywords_page' %}class="on"{% endif %}>🔑 키워드</a>
    <a href="/add" {% if request.endpoint=='add_product' %}class="on"{% endif %}>+ 상품 추가</a>
    <form method="POST" action="/collect-all" style="display:inline">
      <button type="submit" class="btn" style="background:rgba(255,255,255,.12);color:#fff;font-size:12px;padding:6px 12px;border-radius:7px">전체 수집</button>
    </form>
  </div>
</nav>
<div class="wrap">
  {% with msgs=get_flashed_messages() %}{% if msgs %}
  {% for m in msgs %}<div class="alert alert-ok">{{ m }}</div>{% endfor %}
  {% endif %}{% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
